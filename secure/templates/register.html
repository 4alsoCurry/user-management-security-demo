{% extends "base.html" %}

{% block content %}
<div class="card login-card">
    <h2>注册新账号</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        <div class="action-bar">
            <a href="{{ url_for('login') }}" class="btn">前往登录</a>
        </div>
    {% else %}
        <form method="POST" action="{{ url_for('register') }}" class="login-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="请输入用户名" maxlength="50" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="请输入密码" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email"
                       placeholder="请输入邮箱地址" maxlength="100" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" name="phone"
                       placeholder="请输入手机号（选填）" maxlength="20">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>

        <div class="form-footer">
            <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
        </div>
    {% endif %}
</div>
{% endblock %}
