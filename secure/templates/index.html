{% extends "base.html" %}

{% block content %}

{% if user %}
    <div class="card">
        <h2>欢迎回来，{{ user.username }}！</h2>
        <div class="user-info">
            <ul class="info-list">
                <li><span class="label">用户名：</span>{{ user.username }}</li>
                <li><span class="label">邮箱：</span>{{ user.email }}</li>
                <li><span class="label">手机：</span>{{ user.phone }}</li>
                <li><span class="label">角色：</span>{{ user.role }}</li>
                <li><span class="label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>
        <div class="action-bar">
            <a href="{{ url_for('logout') }}" class="btn btn-danger">退出登录</a>
        </div>
    </div>
{% else %}
    <div class="card">
        <h2>欢迎来到用户管理系统</h2>
        <p class="text-muted">请登录以查看您的个人信息。</p>
        <div class="action-bar">
            <a href="{{ url_for('login') }}" class="btn">前往登录</a>
            <a href="{{ url_for('register') }}" class="btn btn-secondary">注册新账号</a>
        </div>
    </div>
{% endif %}

{% endblock %}
