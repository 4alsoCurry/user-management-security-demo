<!DOCTYPE html>

<body>
<h3>帮助中心</h3>
<ul>
  <li><strong>如何登录？</strong>点击右上角"登录"，输入用户名和密码即可。</li>
  <li><strong>如何注册？</strong>点击"注册"，填写用户名、密码、邮箱和手机号。</li>
  <li><strong>如何查看个人信息？</strong>登录后点击"个人中心"即可查看。</li>
  <li><strong>如何充值？</strong>在个人中心页面输入金额并点击充值。</li>
  <li><strong>如何上传头像？</strong>登录后点击"上传头像"，选择图片文件上传。</li>
  <li><strong>忘记密码怎么办？</strong>请联系管理员重置密码。</li>
</ul>
</body>
</html>
