{% extends "base.html" %}

{% block content %}
<div class="card login-card">
    <h2>上传头像</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success and file_url %}
        <div class="alert alert-success">{{ success }}</div>
        <div class="upload-preview">
            <p>文件链接：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a></p>
            <img src="{{ file_url }}" alt="头像预览" class="preview-img">
        </div>
        <div class="action-bar">
            <a href="{{ url_for('upload') }}" class="btn btn-secondary">继续上传</a>
        </div>
    {% else %}
        <form method="POST" action="{{ url_for('upload') }}" class="login-form" enctype="multipart/form-data">
            <div class="form-group">
                <label for="file">选择头像文件</label>
                <input type="file" id="file" name="file" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">上传</button>
        </form>

        <div class="form-footer">
            <p><a href="{{ url_for('index') }}">返回首页</a></p>
        </div>
    {% endif %}
</div>
{% endblock %}
