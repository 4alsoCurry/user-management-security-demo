{% extends "base.html" %}

{% block content %}
<div class="card login-card">
    <h2>个人中心</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        <div class="form-footer">
            <p><a href="{{ url_for('index') }}">返回首页</a></p>
        </div>
    {% elif user %}
        <div class="user-info">
            <ul class="info-list">
                <li><span class="label">ID：</span>{{ user.id }}</li>
                <li><span class="label">用户名：</span>{{ user.username }}</li>
                <li><span class="label">邮箱：</span>{{ user.email }}</li>
                <li><span class="label">手机：</span>{{ user.phone }}</li>
                <li><span class="label">余额：</span><span class="balance">{{ user.balance }}</span></li>
            </ul>
        </div>

        <div class="recharge-section">
            <h3>充值</h3>
            <form method="POST" action="{{ url_for('recharge') }}" class="login-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="amount">金额</label>
                    <input type="number" id="amount" name="amount" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">充值</button>
            </form>
        </div>

        <div class="form-footer">
            <p><a href="{{ url_for('index') }}">返回首页</a></p>
        </div>
    {% endif %}
</div>
{% endblock %}
